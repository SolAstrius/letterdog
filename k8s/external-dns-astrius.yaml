apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns-astrius
  namespace: external-dns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: external-dns-astrius
  template:
    metadata:
      labels:
        app: external-dns-astrius
    spec:
      serviceAccountName: external-dns
      containers:
        - name: external-dns
          image: registry.k8s.io/external-dns/external-dns:v0.21.0
          args:
            - --registry=txt
            - --txt-prefix=_edns.
            - --txt-owner-id=k8s
            - --provider=rfc2136
            - --rfc2136-host=10.0.0.3
            - --rfc2136-port=53
            - --rfc2136-zone=astrius.ink
            - --rfc2136-tsig-keyname=externaldns.
            - --rfc2136-tsig-secret-alg=hmac-sha256
            - --rfc2136-tsig-axfr
            - --source=traefik-proxy
            - --domain-filter=astrius.ink
            - --annotation-filter=external-dns.astrius.ink/enabled=true
            - --policy=sync
            - --managed-record-types=A
            - --managed-record-types=AAAA
          env:
            - name: EXTERNAL_DNS_RFC2136_TSIG_SECRET
              valueFrom:
                secretKeyRef:
                  name: externaldns-tsig
                  key: tsig-secret
